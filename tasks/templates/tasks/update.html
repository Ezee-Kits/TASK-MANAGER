{% extends 'tasks/base.html' %}

{% block head %}
    <title>Update Task</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 0;
        }

        .content {
            max-width: 500px;
            margin: 80px auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            font-size: 26px;
            color: #2d3748;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            box-sizing: border-box;
        }

        input[type="submit"] {
            background-color: #3182ce;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #2b6cb0;
        }
    </style>
{% endblock %}

{% block body %}
<div class="content">
    <h1>✏️ Update Task</h1>
    
    <form method="POST" action="">
        {% csrf_token %}
        {{ form.content }}
        <input type="submit" value="Update">
    </form>
</div>
{% endblock %}
